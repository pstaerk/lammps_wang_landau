<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="contourGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1E3A5F;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#1E3A5F;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Energy landscape contours -->
  <ellipse cx="50" cy="60" rx="45" ry="25" fill="none" stroke="url(#contourGrad)" stroke-width="1.5"/>
  <ellipse cx="50" cy="58" rx="35" ry="20" fill="none" stroke="url(#contourGrad)" stroke-width="1.5"/>
  <ellipse cx="50" cy="56" rx="25" ry="15" fill="none" stroke="url(#contourGrad)" stroke-width="1.5"/>
  <ellipse cx="50" cy="54" rx="15" ry="10" fill="none" stroke="url(#contourGrad)" stroke-width="1.5"/>
  
  <!-- Histogram bars -->
  <rect x="25" y="42" width="8" height="12" fill="#1E3A5F" rx="1"/>
  <rect x="38" y="35" width="8" height="19" fill="#2B5C8A" rx="1"/>
  <rect x="51" y="30" width="8" height="24" fill="#3A7CA5" rx="1"/>
  <rect x="64" y="36" width="8" height="18" fill="#2B5C8A" rx="1"/>
  
  <!-- Random walk path -->
  <path d="M15,25 Q30,20 35,30 T50,40 T65,35 T85,45" 
        fill="none" stroke="#FF6B35" stroke-width="2" 
        stroke-linecap="round" stroke-dasharray="4,3"/>
  
  <!-- WL letters -->
  <text x="50" y="18" font-family="Arial, sans-serif" font-size="10" 
        font-weight="bold" fill="#1E3A5F" text-anchor="middle">WL</text>
</svg>
